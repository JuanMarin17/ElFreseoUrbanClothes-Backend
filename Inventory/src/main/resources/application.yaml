server:
  port: 8089
  servlet:
    context-path: /api/v1

spring:
  application:
    name: inventory

  datasource:
    url: jdbc:postgresql://localhost:5432/inventory
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

product:
  service:
    url: http://localhost:8084
