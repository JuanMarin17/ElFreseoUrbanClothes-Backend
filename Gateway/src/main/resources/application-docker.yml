auth:
  service:
    url: http://auth-service:8082/api/v1

# Perfil activo cuando se corre con Docker Compose.
# Reemplaza todos los "localhost" del application.yaml por los nombres de servicio de Docker.
spring:
  codec:
    max-in-memory-size: 10MB

  cloud:
    gateway:
      routes:
        # ── Auth (público) ────────────────────────────────────────────────────
        - id: auth-routes
          uri: http://auth-service:8082
          predicates:
            - Path=/api/v1/auth/register,
              /api/v1/auth/registerSecondStep,
              /api/v1/auth/resendVerificationCode,
              /api/v1/auth/login,
              /api/v1/auth/loginSecondStep,
              /api/v1/auth/forgotPassword,
              /api/v1/auth/forgotPasswordSecondStep,
              /api/v1/auth/deactivateAccount,
              /api/v1/auth/refresh-token

        # ── Auth sessions (requiere JWT) ──────────────────────────────────────
        - id: auth-session-routes
          uri: http://auth-service:8082
          predicates:
            - Path=/api/v1/auth/sessions/**

        # ── Cart ───────────────────────────────────────────────────────────────
        - id: cart-routes
          uri: http://cart-service:8086
          predicates:
            - Path=/api/v1/stores/*/cart,
              /api/v1/stores/*/cart/**

        # ── Orders ────────────────────────────────────────────────────────────
        - id: order-routes
          uri: http://order-payment-service:8087
          predicates:
            - Path=/api/v1/stores/*/orders,
              /api/v1/stores/*/orders/**

        # ── Notifications (stream SSE público, resto requiere JWT) ────────────
        - id: notification-routes
          uri: http://order-payment-service:8087
          predicates:
            - Path=/api/v1/notifications/**

        # ── Tiendas ───────────────────────────────────────────────────────────
        - id: store-routes
          uri: http://store-service:8081
          predicates:
            - Path=/api/v1/stores,
              /api/v1/stores/**

        # ── Media service (público) ───────────────────────────────────────────
        - id: media-routes
          uri: http://media-service:8096
          predicates:
            - Path=/api/v1/upload,
              /api/v1/upload/**,
              /api/v1/cloudinary/**

        # ── Catálogo global (público) ─────────────────────────────────────────
        - id: catalog-global-public
          uri: http://product-service:8084
          predicates:
            - Path=/api/v1/products/all/active

        # ── Product ───────────────────────────────────────────────────────────
        - id: product-routes
          uri: http://product-service:8084
          predicates:
            - Path=/api/v1/products/**,
              /api/v1/categories/**,
              /api/v1/brands/**

        # ── Alertas de stock SSE (público) ───────────────────────────────────
        - id: stock-alert-routes
          uri: http://product-service:8084
          predicates:
            - Path=/api/v1/alerts/stock/stream/**

        # ── Variantes ─────────────────────────────────────────────────────────
        - id: variant-routes
          uri: http://product-service:8084
          predicates:
            - Path=/api/v1/variants,
              /api/v1/variants/**

        # ── Usuarios público ──────────────────────────────────────────────────
        - id: users-public-routes
          uri: http://users-service:8083
          predicates:
            - Path=/api/v1/users/createUser,
              /api/v1/users/existUser/**,
              /api/v1/users/myUserName/**,
              /api/v1/users/getUserById/**

        # ── Usuarios (requiere JWT) ───────────────────────────────────────────
        - id: users-routes
          uri: http://users-service:8083
          predicates:
            - Path=/api/v1/users/me,
              /api/v1/users/update,
              /api/v1/users/profile-image,
              /api/v1/users/admin/**

        # ── Supplier ──────────────────────────────────────────────────────────
        - id: supplier-routes
          uri: http://supplier-service:8085
          predicates:
            - Path=/api/v1/suppliers/**

        # ── Support ───────────────────────────────────────────────────────────
        - id: support-routes
          uri: http://support-service:8088
          predicates:
            - Path=/api/v1/support/**

        # ── Preferences ───────────────────────────────────────────────────────
        - id: preferences-routes
          uri: http://preferences-service:8094
          predicates:
            - Path=/api/v1/wishlist/**,
              /api/v1/preferences/**

        # ── Inventory ─────────────────────────────────────────────────────────
        - id: inventory-routes
          uri: http://inventory-service:8089
          predicates:
            - Path=/api/v1/inventory/**,
              /api/v1/locations/**

        # ── Promotion ─────────────────────────────────────────────────────────
        - id: promotion-routes
          uri: http://promotion-service:8091
          predicates:
            - Path=/api/v1/promotions/**,
              /api/v1/coupons/**

        # ── Returns ───────────────────────────────────────────────────────────
        - id: returns-routes
          uri: http://returns-service:8092
          predicates:
            - Path=/api/v1/returns/**

        # ── Reports ───────────────────────────────────────────────────────────
        - id: reports-routes
          uri: http://reports-service:8100
          predicates:
            - Path=/api/v1/reports/**

        # ── Payment OAuth (público) ───────────────────────────────────────────
        - id: payment-oauth-public-routes
          uri: http://payment-service:8098
          predicates:
            - Path=/api/v1/oauth/callback,
              /api/v1/payments/webhook

        # ── Payment ───────────────────────────────────────────────────────────
        - id: payment-routes
          uri: http://payment-service:8098
          predicates:
            - Path=/api/v1/payments/**,
              /api/v1/oauth/**

        # ── LoyalCustomer (internas) ──────────────────────────────────────────
        - id: loyalty-internal-routes
          uri: http://loyal-customer-service:8093
          predicates:
            - Path=/api/v1/loyalty/internal/**

        # ── LoyalCustomer ─────────────────────────────────────────────────────
        - id: loyalty-routes
          uri: http://loyal-customer-service:8093
          predicates:
            - Path=/api/v1/loyalty/**

        # ── Community Reviews (público GET /reviews) ──────────────────────────
        - id: community-reviews-public
          uri: http://reviews-service:8095
          predicates:
            - Path=/api/v1/reviews

        # ── Reviews ───────────────────────────────────────────────────────────
        - id: reviews-routes
          uri: http://reviews-service:8095
          predicates:
            - Path=/api/v1/reviews/**

        # ── CMS ───────────────────────────────────────────────────────────────
        - id: cms-routes
          uri: http://cms-service:8101
          predicates:
            - Path=/api/v1/cms/**

        # ── IA User ───────────────────────────────────────────────────────────
        - id: ia-user-routes
          uri: http://ia-user-service:8099
          predicates:
            - Path=/api/v1/ia/user/**

        # ── IA Admin ──────────────────────────────────────────────────────────
        - id: ia-admin-routes
          uri: http://ia-admin-service:8102
          predicates:
            - Path=/api/v1/ia/admin/**

        # ── IA Store Builder ──────────────────────────────────────────────────
        - id: ia-builder-routes
          uri: http://ia-store-builder-service:8113
          predicates:
            - Path=/api/v1/ia/builder/**

        # ── Transaction / Billing (público para ver planes) ───────────────────
        - id: transaction-plans-public
          uri: http://transaction-service:8103
          predicates:
            - Path=/api/v1/transactions/plans,
              /api/v1/transactions/plans/**,
              /api/v1/transactions/limits/**,
              /api/v1/transactions/webhook

        # ── Transaction / Billing ─────────────────────────────────────────────
        - id: transaction-routes
          uri: http://transaction-service:8103
          predicates:
            - Path=/api/v1/transactions/**

        # ── Customer (gestión de clientes por tienda) ─────────────────────────
        - id: customer-routes
          uri: http://customer-service:8104
          predicates:
            - Path=/api/v1/stores/*/customers/**

        # ── POS Sale (ventas en punto de venta) ───────────────────────────────
        - id: pos-sale-routes
          uri: http://pos-sale-service:8105
          predicates:
            - Path=/api/v1/stores/*/pos/**
