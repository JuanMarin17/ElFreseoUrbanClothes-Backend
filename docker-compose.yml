      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reviews
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/reviews
