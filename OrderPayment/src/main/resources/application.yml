server:
  port: 8087

spring:
  application:
    name: order-payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/order_payment
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# URL del módulo de carrito
cart:
  service:
    base-url: http://localhost:8086
