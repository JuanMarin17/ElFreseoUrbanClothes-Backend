spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Rutas públicas — sin JWT
        - id: auth-public-routes
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/register,/api/v1/users/registerSecondStep,/api/v1/users/resendVerificationCode,/api/v1/users/login,/api/v1/users/loginSecondStep

        # Rutas protegidas — con JWT
        - id: auth-protected-routes
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtValidationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: 8080

security:
