server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: Users

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/users}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8082/api/v1}

store:
  service:
    url: ${STORE_SERVICE_URL:http://localhost:8081/api/v1}

media:
  service:
    url: ${MEDIA_SERVICE_URL:http://localhost:8096}
