      - vexio-net
    restart: unless-stopped

  # ── SERVICIOS CON DEPENDENCIAS ENTRE MICROSERVICIOS ──────────────────────────
  # Estos necesitan que otro microservicio esté levantado (no solo la BD).
  # condition: service_started = el contenedor corrió, no espera que el servicio
  # esté 100% listo (Spring Boot tiene reintentos internos si falla al inicio).

  inventory-service:
    build:
      context: ./Inventory
      dockerfile: ../Dockerfile
    container_name: inventory-service
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/inventory
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      PRODUCT_SERVICE_URL: http://product-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - vexio-net
    restart: unless-stopped

  order-payment-service:
