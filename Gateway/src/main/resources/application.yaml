spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # Rutas públicas — no requieren JWT
        - id: auth-routes
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/auth/register,
                    /api/v1/auth/registerSecondStep,
                    /api/v1/auth/resendVerificationCode,
                    /api/v1/auth/login,
                    /api/v1/auth/loginSecondStep
          
        - id: users
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtValidationFilter
server:
  port: 8080

security:
