# ─────────────────────────────────────────────────────────────────────────────
# Vexio — Docker Compose
#
# ANTES DE USAR:
#   1. Ejecuta build-all.ps1 para compilar todos los JARs
#   2. Crea un archivo .env en esta carpeta con tus variables secretas:
#        NAME_CLOUD=tu_cloudinary_name
#        KEY_CLOUD=tu_cloudinary_key
#        SECRET_CLOUD=tu_cloudinary_secret
#   3. Levanta todo con: docker-compose up -d
#   4. Para ver los logs: docker-compose logs -f
#   5. Para detener: docker-compose down
# ─────────────────────────────────────────────────────────────────────────────

networks:
  vexio-net:
    driver: bridge   # Red interna compartida por todos los contenedores

volumes:
  postgres-data:     # Volumen persistente: los datos de la BD sobreviven reinicios

services:

  # ── POSTGRESQL ──────────────────────────────────────────────────────────────
  # Un solo contenedor de PostgreSQL aloja las 15 bases de datos.
  # El archivo init.sql se ejecuta automáticamente la primera vez.
  postgres:
    image: postgres:16-alpine
    container_name: vexio-postgres
    command: postgres -c max_connections=300   # 15 servicios x 5 pool = 75, con margen
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"   # Sigue accesible desde DBeaver en localhost:5432
    networks:
      - vexio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10     # Los servicios esperan a que Postgres esté listo antes de iniciar

  # ── SERVICIOS SIN DEPENDENCIAS ENTRE MICROSERVICIOS ─────────────────────────
  # Estos servicios solo dependen de la base de datos.

  auth-service:
    build:
      context: ./Auth
      dockerfile: ../Dockerfile   # Dockerfile genérico en la raíz del proyecto
    container_name: auth-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      # SPRING_DATASOURCE_URL sobreescribe spring.datasource.url del application.yaml
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/auth   # por si el YAML usa ${DB_URL}
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      USERS_SERVICE_URL: http://users-service:8083/api/v1
      JWT_SECRET: Wm5N30DT1nFqUmdjrvM4GWqw1utDrSlpdDLyDGa4kBw=
      MAIL_USERNAME: vexiomultistore@gmail.com
      MAIL_PASSWORD: "fqqq kpuc qniw pwkb"
    depends_on:
      postgres:
        condition: service_healthy   # Espera que Postgres pase el healthcheck
    networks:
      - vexio-net
    restart: unless-stopped

  users-service:
    build:
      context: ./Users
      dockerfile: ../Dockerfile
    container_name: users-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/users
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      AUTH_SERVICE_URL: http://auth-service:8082/api/v1
      USERS_SERVICE_URL: http://auth-service:8082/api/v1
      NAME_CLOUD: ${NAME_CLOUD}
      KEY_CLOUD: ${KEY_CLOUD}
      SECRET_CLOUD: ${SECRET_CLOUD}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexio-net
    restart: unless-stopped

  store-service:
    build:
      context: ./Store
      dockerfile: ../Dockerfile
    container_name: store-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/store
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/store
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      USERS_SERVICE_URL: http://users-service:8083/api/v1
      JWT_SECRET: Wm5N30DT1nFqUmdjrvM4GWqw1utDrSlpdDLyDGa4kBw=
      NAME_CLOUD: ${NAME_CLOUD}
      KEY_CLOUD: ${KEY_CLOUD}
      SECRET_CLOUD: ${SECRET_CLOUD}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB
