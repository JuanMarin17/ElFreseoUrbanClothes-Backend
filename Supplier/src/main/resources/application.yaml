server:
  port: 8085
  servlet:
    context-path: /api/v1

spring:
  application:
    name: supplier

  datasource:
    url: jdbc:postgresql://localhost:5432/supplier
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
