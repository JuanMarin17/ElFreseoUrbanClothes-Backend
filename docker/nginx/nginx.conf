events {
    worker_connections 1024;
}

http {
    # Redirige todo HTTP a HTTPS
    server {
        listen 80;
        server_name _;

        # Ruta que usa Certbot para verificar el dominio (renovación automática)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — proxy al Gateway interno
    server {
        listen 443 ssl;
        server_name vexio-multi-store.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/vexio-multi-store.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vexio-multi-store.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Tamaño máximo de body (para subida de imágenes)
        client_max_body_size 20M;

        location / {
            proxy_pass         http://gateway:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE (Server-Sent Events) — sin buffer para streaming en tiempo real
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }
    }
}
