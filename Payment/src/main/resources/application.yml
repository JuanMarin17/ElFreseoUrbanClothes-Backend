server:
  port: ${SERVER_PORT:8098}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: payment

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payments}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ─── Mercado Pago ─────────────────────────────────────────────────────────────
mercadopago:
  access-token: ${MP_ACCESS_TOKEN}
  client-id: ${MP_CLIENT_ID}
  client-secret: ${MP_CLIENT_SECRET}
  webhook-secret: ${MP_WEBHOOK_SECRET}
  platform-fee-ratio: ${MP_FEE_RATIO:0.01}
  redirect-uri: ${APP_BASE_URL:http://localhost:8080}/api/v1/oauth/callback
  notification-url: ${APP_BASE_URL:http://localhost:8080}/api/v1/payments/webhook

# ─── App ──────────────────────────────────────────────────────────────────────
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
