server:
  port: ${SERVER_PORT:8091}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: promotion

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/promotion}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
