    restart: unless-stopped

  supplier-service:
    build:
      context: ./Supplier
      dockerfile: ../Dockerfile
    container_name: supplier-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supplier
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/supplier
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
    depends_on:
