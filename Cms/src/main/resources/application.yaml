server:
  port: ${SERVER_PORT:8101}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: cms

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cms}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

preferences:
  service:
    url: ${PREFERENCES_SERVICE_URL:http://localhost:8094/api/v1}

product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8084/api/v1}

store:
  service:
    url: ${STORE_SERVICE_URL:http://localhost:8081/api/v1}
