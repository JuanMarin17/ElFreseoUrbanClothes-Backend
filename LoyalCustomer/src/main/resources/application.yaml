server:
  port: ${SERVER_PORT:8093}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: loyalty

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loyalty}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

loyalty:
  points-per-amount: ${LOYALTY_POINTS_PER_AMOUNT:4000}
  expiry-days: ${LOYALTY_EXPIRY_DAYS:90}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
