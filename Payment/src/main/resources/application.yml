spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tuapp_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ─── Mercado Pago ───────────────────────────────────────────────────────────
mercadopago:
  # Tu Access Token de PLATAFORMA (cuenta principal)
  access-token: ${MP_ACCESS_TOKEN}
  # Tu Client ID y Secret para OAuth (para que los tenants conecten SU cuenta)
  client-id: ${MP_CLIENT_ID}
  client-secret: ${MP_CLIENT_SECRET}
  # Webhook secret para validar notificaciones
  webhook-secret: ${MP_WEBHOOK_SECRET}
  # Comisión que cobras tú (1% = 0.01)
  platform-fee-ratio: 0.01
  # URL base de tu app (para redirects de OAuth y webhooks)
  redirect-uri: ${APP_BASE_URL:http://localhost:8080}/api/oauth/callback
  notification-url: ${APP_BASE_URL:http://localhost:8080}/api/payments/webhook

# ─── App ────────────────────────────────────────────────────────────────────
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

server:
  port: 8080
