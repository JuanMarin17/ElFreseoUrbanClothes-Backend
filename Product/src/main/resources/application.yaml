spring:
  application:
    name: product

  datasource:
    url: jdbc:postgresql://localhost:5432/product
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8084 # Se lee desde .env
  servlet:
    context-path: /api/v1
