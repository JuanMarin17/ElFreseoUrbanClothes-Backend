server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: store

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/store}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      INDENT_OUTPUT: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

security:
  jwt:
    secret-key: ${JWT_SECRET:Wm5N30DT1nFqUmdjrvM4GWqw1utDrSlpdDLyDGa4kBw=}

users:
  service:
    url: ${USERS_SERVICE_URL:http://localhost:8083/api/v1}

cloudinary:
  cloud_name: ${NAME_CLOUD}
  api_key: ${KEY_CLOUD}
  api_secret: ${SECRET_CLOUD}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
