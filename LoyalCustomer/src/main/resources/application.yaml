server:
  port: 8093
  servlet:
    context-path: /api/v1

spring:
  application:
    name: loyalty

  datasource:
    url: jdbc:postgresql://localhost:5432/loyalty
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

loyalty:
  points-per-amount: 4000
  expiry-days: 90
