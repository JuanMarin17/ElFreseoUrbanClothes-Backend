spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # Rutas públicas — no requieren JWT
        - id: auth-routes
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/register,
                    /api/v1/users/registerSecondStep,
                    /api/v1/users/resendVerificationCode,
                    /api/v1/users/login,
                    /api/v1/users/loginSecondStep
          
        - id:
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtValidationFilter
server:
  port: 8080

security:
