spring:
  application:
    name: product

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL} # Se lee desde .env
    username: ${DB_USER} # Se lee desde .env
    password: ${DB_PASSWORD} # Se lee desde .env

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT} # Se lee desde .env
  servlet:
    context-path: /api/v1

cloudinary:
  cloud_name: ${NAME_CLOUD} # Se lee desde .env
  api_key: ${KEY_CLOUD} # Se lee desde .env
  api_secret: ${SECRET_CLOUD} # Se lee desde .env
