auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8082/api/v1}

# Perfil activo en Railway. Usa la red privada interna de Railway (.railway.internal).
# Activar con: SPRING_PROFILES_ACTIVE=railway
spring:
  codec:
    max-in-memory-size: 10MB

  cloud:
    gateway:
      routes:
        # ── Auth (público) ────────────────────────────────────────────────────
        - id: auth-routes
          uri: http://auth-service.railway.internal:8082
          predicates:
            - Path=/api/v1/auth/register,
              /api/v1/auth/registerSecondStep,
              /api/v1/auth/resendVerificationCode,
              /api/v1/auth/login,
              /api/v1/auth/loginSecondStep,
              /api/v1/auth/google,
              /api/v1/auth/forgotPassword,
              /api/v1/auth/forgotPasswordSecondStep,
              /api/v1/auth/deactivateAccount,
              /api/v1/auth/refresh-token

        # ── Cart (antes de store-routes para mayor especificidad) ─────────────
        - id: cart-routes
          uri: http://cart-service.railway.internal:8086
          predicates:
            - Path=/api/v1/stores/*/cart,
              /api/v1/stores/*/cart/**
          filters:
            - JwtValidationFilter

        # ── Orders (antes de store-routes para mayor especificidad) ──────────
        - id: order-routes
          uri: http://order-payment-service.railway.internal:8087
          predicates:
            - Path=/api/v1/stores/*/orders,
              /api/v1/stores/*/orders/**
          filters:
            - JwtValidationFilter

        # ── Notifications (stream SSE público, resto requiere JWT) ────────────
        - id: notification-routes
          uri: http://order-payment-service.railway.internal:8087
          predicates:
            - Path=/api/v1/notifications/**

        # ── Streams SSE de admin por tienda (antes de store-routes: si no, los
        #    intercepta /api/v1/stores/** y los manda al microservicio Store) ──
        - id: order-admin-stream-routes
          uri: http://order-payment-service.railway.internal:8087
          predicates:
            - Path=/api/v1/stores/*/notifications/admin/stream

        - id: support-admin-stream-routes
          uri: http://support-service.railway.internal:8088
          predicates:
            - Path=/api/v1/stores/*/support/notifications/stream

        - id: reviews-admin-stream-routes
          uri: http://reviews-service.railway.internal:8095
          predicates:
            - Path=/api/v1/stores/*/reviews/notifications/stream

        - id: returns-admin-stream-routes
          uri: http://returns-service.railway.internal:8092
          predicates:
            - Path=/api/v1/stores/*/returns/notifications/stream

        # ── Customer y POS Sale (antes de store-routes: si no, los intercepta
        #    /api/v1/stores/** y los manda al microservicio Store) ────────────
        - id: customer-routes
          uri: http://customer-service.railway.internal:8104
          predicates:
            - Path=/api/v1/stores/*/customers/**
          filters:
            - JwtValidationFilter

        - id: pos-sale-routes
          uri: http://pos-sale-service.railway.internal:8105
          predicates:
            - Path=/api/v1/stores/*/pos/**
          filters:
            - JwtValidationFilter

        # ── Tiendas ───────────────────────────────────────────────────────────
        - id: store-routes
          uri: http://store-service.railway.internal:8081
          predicates:
            - Path=/api/v1/stores,
              /api/v1/stores/**

        # ── Media service (público — Cloudinary controla el abuso) ──────────
        - id: media-routes
          uri: http://media-service.railway.internal:8096
          predicates:
            - Path=/api/v1/upload,
              /api/v1/upload/**,
              /api/v1/cloudinary/**

        # ── Product ───────────────────────────────────────────────────────────
        # u{2500}u{2500} Catu{00E1}logo global (pu{00FA}blico u{2014} sin JWT) u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}u{2500}
        - id: catalog-global-public
          uri: http://product-service.railway.internal:8084
          predicates:
            - Path=/api/v1/products/all/active
            - Method=GET

        - id: product-routes
          uri: http://product-service.railway.internal:8084
          predicates:
            - Path=/api/v1/products/**,
              /api/v1/categories/**,
              /api/v1/brands/**
          filters:
            - JwtValidationFilter

        # ── Alertas de stock SSE (sin JWT para que el frontend pueda conectarse)
        - id: stock-alert-routes
          uri: http://product-service.railway.internal:8084
          predicates:
            - Path=/api/v1/alerts/stock/stream/**

        # ── Variantes ─────────────────────────────────────────────────────────
        - id: variant-routes
          uri: http://product-service.railway.internal:8084
          predicates:
            - Path=/api/v1/variants,
              /api/v1/variants/**
          filters:
            - JwtValidationFilter

        # ── Usuarios público (sin JWT) ────────────────────────────────────────
        - id: users-public-routes
          uri: http://users-service.railway.internal:8083
          predicates:
            - Path=/api/v1/users/createUser,
              /api/v1/users/existUser/**,
              /api/v1/users/myUserName/**,
              /api/v1/users/getUserById/**

        # ── Usuarios (requiere JWT) ───────────────────────────────────────────
        - id: users-routes
          uri: http://users-service.railway.internal:8083
          predicates:
            - Path=/api/v1/users/me,
              /api/v1/users/update,
              /api/v1/users/profile-image
          filters:
            - JwtValidationFilter

        # ── Supplier ──────────────────────────────────────────────────────────
        - id: supplier-routes
          uri: http://supplier-service.railway.internal:8085
          predicates:
            - Path=/api/v1/suppliers/**
          filters:
            - JwtValidationFilter

        # ── Support ───────────────────────────────────────────────────────────
        - id: support-routes
          uri: http://support-service.railway.internal:8088
          predicates:
            - Path=/api/v1/support/**
          filters:
            - JwtValidationFilter

        # ── Preferences ───────────────────────────────────────────────────────
        - id: preferences-routes
          uri: http://preferences-service.railway.internal:8094
          predicates:
            - Path=/api/v1/wishlist/**,
              /api/v1/preferences/**
          filters:
            - JwtValidationFilter

        # ── Inventory ─────────────────────────────────────────────────────────
        - id: inventory-routes
          uri: http://inventory-service.railway.internal:8089
          predicates:
            - Path=/api/v1/inventory/**,
              /api/v1/locations/**
          filters:
            - JwtValidationFilter

        # ── Promotion ─────────────────────────────────────────────────────────
        - id: promotion-routes
          uri: http://promotion-service.railway.internal:8091
          predicates:
            - Path=/api/v1/promotions/**,
              /api/v1/coupons/**
          filters:
            - JwtValidationFilter

        # ── Returns ───────────────────────────────────────────────────────────
        - id: returns-routes
          uri: http://returns-service.railway.internal:8092
          predicates:
            - Path=/api/v1/returns/**
          filters:
            - JwtValidationFilter

        # ── Reports ───────────────────────────────────────────────────────────
        - id: reports-routes
          uri: http://reports-service.railway.internal:8100
          predicates:
            - Path=/api/v1/reports/**
          filters:
            - JwtValidationFilter

        # ── Payment OAuth (callback público, MP no manda JWT) ─────────────────
        - id: payment-oauth-public-routes
          uri: http://payment-service.railway.internal:8098
          predicates:
            - Path=/api/v1/oauth/callback,
              /api/v1/payments/webhook

        # ── Payment (protegido) ───────────────────────────────────────────────
        - id: payment-routes
          uri: http://payment-service.railway.internal:8098
          predicates:
            - Path=/api/v1/payments/**,
              /api/v1/oauth/**
          filters:
            - JwtValidationFilter

        # ── LoyalCustomer (internas entre microservicios, sin JWT) ────────────
        - id: loyalty-internal-routes
          uri: http://loyal-customer-service.railway.internal:8093
          predicates:
            - Path=/api/v1/loyalty/internal/**

        # ── LoyalCustomer (protegidas) ────────────────────────────────────────
        - id: loyalty-routes
          uri: http://loyal-customer-service.railway.internal:8093
          predicates:
            - Path=/api/v1/loyalty/**
          filters:
            - JwtValidationFilter

        # ── Reviews ───────────────────────────────────────────────────────────
        - id: reviews-routes
          uri: http://reviews-service.railway.internal:8095
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - JwtValidationFilter

        # ── CMS ───────────────────────────────────────────────────────────────
        - id: cms-routes
          uri: http://cms-service.railway.internal:8101
          predicates:
            - Path=/api/v1/cms/**
          filters:
            - JwtValidationFilter

        # ── IA User ───────────────────────────────────────────────────────────
        - id: ia-user-routes
          uri: http://ia-user-service.railway.internal:8099
          predicates:
            - Path=/api/v1/ia/user/**
          filters:
            - JwtValidationFilter

        # ── IA Admin ──────────────────────────────────────────────────────────
        - id: ia-admin-routes
          uri: http://ia-admin-service.railway.internal:8102
          predicates:
            - Path=/api/v1/ia/admin/**
          filters:
            - JwtValidationFilter

        # ── IA Store Builder ──────────────────────────────────────────────────
        - id: ia-builder-routes
          uri: http://ia-store-builder-service.railway.internal:8113
          predicates:
            - Path=/api/v1/ia/builder/**
          filters:
            - JwtValidationFilter

        # ── Transaction / Billing (público para ver planes) ───────────────────
        - id: transaction-plans-public
          uri: http://transaction-service.railway.internal:8103
          predicates:
            - Path=/api/v1/transactions/plans,
              /api/v1/transactions/plans/**,
              /api/v1/transactions/limits/**,
              /api/v1/transactions/webhook

        # ── Transaction / Billing (protegido) ────────────────────────────────
        - id: transaction-routes
          uri: http://transaction-service.railway.internal:8103
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - JwtValidationFilter

        # ── Sesiones de usuario (requiere JWT) ────────────────────────────────
        - id: auth-session-routes
          uri: http://auth-service.railway.internal:8082
          predicates:
            - Path=/api/v1/auth/sessions/**
          filters:
            - JwtValidationFilter
