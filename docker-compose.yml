      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/product
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      STORE_SERVICE_URL: http://store-service:8081/api/v1
      # Credenciales de Cloudinary: define estas en el .env de esta carpeta
      NAME_CLOUD: ${NAME_CLOUD}
      KEY_CLOUD: ${KEY_CLOUD}
      SECRET_CLOUD: ${SECRET_CLOUD}
