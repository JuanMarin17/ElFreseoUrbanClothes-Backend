      context: ./OrderPayment
      dockerfile: ../Dockerfile
    container_name: order-payment-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_payment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/order_payment
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      CART_SERVICE_URL: http://cart-service:8086/api/v1
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started
    networks:
      - vexio-net
    restart: unless-stopped

  returns-service:
    build:
      context: ./Returns
      dockerfile: ../Dockerfile
    container_name: returns-service
    ports:
      - "8092:8092"
    environment:
      SERVER_PORT: 8092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/returns
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/returns
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      ORDER_SERVICE_URL: http://order-payment-service:8087/api/v1
    depends_on:
      postgres:
        condition: service_healthy
      order-payment-service:
        condition: service_started
    networks:
      - vexio-net
    restart: unless-stopped

  # ── GATEWAY (último en levantar) ─────────────────────────────────────────────
  # El Gateway enruta todas las peticiones externas a los microservicios.
  # SPRING_PROFILES_ACTIVE=docker activa application-docker.yml, que reemplaza
  # los "localhost" de application.yaml por los nombres de servicio de Docker.
  gateway:
    build:
      context: ./Gateway
      dockerfile: ../Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"   # Único puerto expuesto al exterior; todo pasa por aquí
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: Wm5N30DT1nFqUmdjrvM4GWqw1utDrSlpdDLyDGa4kBw=
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - auth-service
      - users-service
      - store-service
      - product-service
      - cart-service
      - order-payment-service
      - inventory-service
      - support-service
      - supplier-service
      - promotion-service
      - returns-service
      - loyal-customer-service
      - preferences-service
      - reviews-service
      - media-service
      - ia-user-service
    networks:
      - vexio-net
    restart: unless-stopped
