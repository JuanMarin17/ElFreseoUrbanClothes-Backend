spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ── Auth (público) ────────────────────────────────────────────────────
        - id: auth-routes
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/auth/register,
              /api/v1/auth/registerSecondStep,
              /api/v1/auth/resendVerificationCode,
              /api/v1/auth/login,
              /api/v1/auth/loginSecondStep,
              /api/v1/auth/forgotPassword,
              /api/v1/auth/forgotPasswordSecondStep
              /api/v1/auth/forgotPasswordSecondStep,
              /api/v1/auth/deactivateAccount,

        # ── Tiendas ───────────────────────────────────────────────────────────
        - id: store-routes
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/stores,
              /api/v1/stores/**
        # ── Product ───────────────────────────────────────────────────────────────
        - id: product-routes
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/products/**,
              /api/v1/categories/**,
              /api/v1/brands/**,
              /api/v1/variants/**,
              /api/v1/cloudinary/**
          filters:
            - JwtValidationFilter

        # ── Alertas de stock SSE (sin JWT para que el frontend pueda conectarse) ──
        - id: stock-alert-routes
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/alerts/stock/stream

        # ── Variantes ─────────────────────────────────────────────────────────
        - id: variant-routes
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/variants,
              /api/v1/variants/**

        # ── Usuarios (requiere JWT) ───────────────────────────────────────────
        - id: users-routes
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/users/me,
              /api/v1/users/createUser,
              /api/v1/users/update,
              /api/v1/users/{id}
          filters:
            - JwtValidationFilter
        # ── Supplier ─────────────────────────────────────────────────────────
        - id: supplier-routes
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/suppliers/**
          filters:
            - JwtValidationFilter
        # ── Support ─────────────────────────────────────────────────────────
        - id: support-routes
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/support/**
          filters:
            - JwtValidationFilter
        # ── Preferences ─────────────────────────────────────────────────────────
        - id: preferences-routes
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/reviews/**,
              /api/v1/wishlist/**,
              /api/v1/preferences/**
          filters:
            - JwtValidationFilter
        # ── Inventory ─────────────────────────────────────────────────────────
        - id: inventory-routes
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/inventory/**,
              /api/v1/locations/**
          filters:
            - JwtValidationFilter
        # ── Promotion ─────────────────────────────────────────────────────────
        - id: promotion-routes
          uri: http://localhost:8091
          predicates:
            - Path=/api/v1/promotions/**,
              /api/v1/coupons/**
          filters:
            - JwtValidationFilter
        # ── Returns ─────────────────────────────────────────────────────────
        - id: returns-routes
          uri: http://localhost:8092
          predicates:
            - Path=/api/v1/returns/**
          filters:
            - JwtValidationFilter
server:
  port: 8080

security:
