  ia-user-service:
    build:
      context: ./IaUser
    container_name: ia-user-service
    ports:
      - "8099:8099"
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/ia_user
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      PRODUCT_SERVICE_URL: http://product-service:8084
      CART_SERVICE_URL: http://cart-service:8086
      SUPPORT_SERVICE_URL: http://support-service:8088
      STORE_SERVICE_URL: http://store-service:8081
      PROMOTIONS_SERVICE_URL: http://promotion-service:8091
      REVIEWS_SERVICE_URL: http://reviews-service:8095
      CMS_SERVICE_URL: http://cms-service:8101
      PREFERENCES_SERVICE_URL: http://preferences-service:8094
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      support-service:
        condition: service_started
      store-service:
        condition: service_started
      promotion-service:
        condition: service_started
      reviews-service:
        condition: service_started
      preferences-service:
        condition: service_started
