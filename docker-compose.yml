    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/support
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      DB_URL: jdbc:postgresql://postgres:5432/support
      DB_USER: postgres
      DB_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      MAIL_USERNAME: vexiomultistore@gmail.com
      MAIL_PASSWORD: "fqqq kpuc qniw pwkb"
    depends_on:
