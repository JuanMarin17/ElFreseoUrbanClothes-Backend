server:
  port: ${SERVER_PORT:8087}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: order-payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/order_payment}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

cart:
  service:
    base-url: ${CART_SERVICE_URL:http://localhost:8086/api/v1}

promotion:
  service:
    url: ${PROMOTION_SERVICE_URL:http://localhost:8091/api/v1}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
