spring:
  application:
    name: product

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000        # cierra conexiones inactivas después de 10 min
      max-lifetime: 1800000       # recicla conexiones cada 30 min (antes de que Postgres las cierre)
      keepalive-time: 60000       # ping cada 1 min para mantener la conexión viva
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /api/v1

store:
  service:
    url: ${STORE_SERVICE_URL:http://localhost:8081/api/v1}

media:
  service:
    url: ${MEDIA_SERVICE_URL:http://localhost:8096}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
