server:
  port: 8083
  servlet:
    context-path: /api/v1

spring:
  application:
    name: Users

  datasource:
    url: jdbc:postgresql://localhost:5432/users
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# eureka:
#   client:
#     service-url:
#       defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always